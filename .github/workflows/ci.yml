name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Type check
        run: uv run pyright src/
      - name: Test
        run: uv run pytest --tb=short
